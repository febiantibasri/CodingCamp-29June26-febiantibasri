<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>To-Do List Life Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>To-Do List Life Dashboard</h1>
    </header>

    <main class="container">

        <!-- Greeting -->
        <section class="card">
            <h2>Greeting</h2>

            <p id="greeting">
                Memuat sapaan...
            </p>
        </section>

        <!-- Clock -->
        <section class="card">

            <h2>Current Time</h2>

            <h1 id="clock">
                00:00:00
            </h1>

            <p id="date">
                Loading...
            </p>

        </section>

        <!-- Pomodoro -->
        <section class="card">

            <h2>Pomodoro Timer</h2>

            <h1 id="timer">
                25:00
            </h1>

            <div class="button-group">

                <button id="startBtn">
                    Start
                </button>

                <button id="stopBtn">
                    Stop
                </button>

                <button id="resetBtn">
                    Reset
                </button>

            </div>

        </section>

        <!-- Todo -->

        <section class="card">

            <h2>To Do List</h2>

            <input
                type="text"
                id="taskInput"
                placeholder="Tambah kegiatan...">

            <button id="addTask">

                Tambah

            </button>

            <ul id="taskList">

            </ul>

        </section>

        <!-- Quick Links -->

        <section class="card">

            <h2>Quick Links</h2>

            <div id="quickLinks">

            </div>

            <button id="addLink">

                Tambah Link

            </button>

        </section>

    </main>

    <footer>

        <p>

            © 2026 Febianti Basri

        </p>

    </footer>

    <script src="js/script.js"></script>

</body>

</html>
<button id="themeBtn">

🌙 Dark Mode

</button>
